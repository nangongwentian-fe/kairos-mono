<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kairos Coding Web</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="side-panel" aria-label="Run details">
        <div class="brand">
          <span class="brand-mark">K</span>
          <div>
            <h1>Kairos</h1>
            <p>Coding Web</p>
          </div>
        </div>

        <section class="status-panel" aria-label="Run status">
          <div class="metric">
            <span>Status</span>
            <strong id="run-status">idle</strong>
          </div>
          <div class="metric-row">
            <div class="metric">
              <span>Turn</span>
              <strong id="run-turn">-</strong>
            </div>
            <div class="metric">
              <span>Runs</span>
              <strong id="run-count">0</strong>
            </div>
          </div>
          <div class="metric">
            <span>Stop</span>
            <strong id="run-stop">-</strong>
          </div>
        </section>

        <section class="todo-panel" aria-label="Todo list">
          <div class="panel-heading">
            <h2>Todos</h2>
            <span id="todo-counts">0 / 0 / 0</span>
          </div>
          <ol id="todo-list" class="todo-list"></ol>
        </section>
      </aside>

      <section class="workspace-panel" aria-label="Coding transcript">
        <header class="topbar">
          <div>
            <p class="eyebrow">Local agent session</p>
            <h2>Workspace transcript</h2>
          </div>
          <button id="reset-button" type="button" class="button secondary">New</button>
        </header>

        <section id="transcript" class="transcript" aria-live="polite"></section>

        <section
          id="approval-panel"
          class="approval-panel"
          aria-label="Tool approval"
          hidden
        >
          <div class="approval-header">
            <div>
              <p class="eyebrow">Permission required</p>
              <h3 id="approval-name">Tool request</h3>
            </div>
            <span id="approval-risk" class="approval-risk">write</span>
          </div>
          <div class="approval-grid">
            <div>
              <p class="approval-label">Arguments</p>
              <pre id="approval-args" class="approval-code"></pre>
            </div>
            <div>
              <p class="approval-label">Preview</p>
              <pre id="approval-preview" class="approval-code"></pre>
            </div>
          </div>
          <div class="approval-actions">
            <button id="approval-deny" type="button" class="button secondary">
              Deny
            </button>
            <button id="approval-allow" type="button" class="button primary">
              Allow once
            </button>
          </div>
        </section>

        <form id="prompt-form" class="prompt-box">
          <textarea
            id="prompt-input"
            name="prompt"
            rows="3"
            placeholder="Ask Kairos to inspect, explain, or change this workspace."
            autocomplete="off"
          ></textarea>
          <div class="prompt-actions">
            <p id="notice" class="notice"></p>
            <button id="run-button" type="submit" class="button primary">Run</button>
          </div>
        </form>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
